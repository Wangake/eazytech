<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAZY TECH - Games</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <img src="https://files.catbox.moe/2sbsgm.png" alt="EAZY TECH" class="logo-img">
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="games.html" class="active">Games</a></li>
            <li><a href="movies.html">Movies</a></li>
            <li><a href="admin.html">Admin</a></li>
            <li><a href="payment.html">Pay</a></li>
            <li><a href="complaint.html">Help</a></li>
        </ul>
    </nav>

    <main>
        <h1>🎮 Games Library</h1>
        
        <!-- Console Filters -->
        <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
            <button class="btn" onclick="filterGames('all')">All</button>
            <button class="btn" onclick="filterGames('ps5')">PS5</button>
            <button class="btn" onclick="filterGames('ps4')">PS4</button>
            <button class="btn" onclick="filterGames('ps3')">PS3</button>
            <button class="btn" onclick="filterGames('pc')">PC</button>
        </div>

        <!-- Games Grid -->
        <div class="card-grid" id="gamesGrid">
            <!-- Games loaded via JS -->
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <img src="https://files.catbox.moe/2sbsgm.png" alt="EAZY TECH" class="footer-logo">
                <p>Your #1 gaming & cyber hub in Nairobi.</p>
            </div>
            <div class="footer-section">
                <h4>Contact</h4>
                <ul>
                    <li><i class="fas fa-phone"></i> +254 758 476 795</li>
                    <li><i class="fas fa-envelope"></i> wangamegan@gmail.com</li>
                </ul>
            </div>
        </div>
    </footer>

    <div id="toast" class="toast"></div>

    <script>
        const games = {
            ps5: [
                { name: 'God of War Ragnarök', console: 'PS5', image: 'https://files.catbox.moe/zdoq7w.png' },
                { name: 'Spider-Man 2', console: 'PS5', image: 'https://files.catbox.moe/zdoq7w.png' },
                { name: 'FIFA 24', console: 'PS5', image: 'https://files.catbox.moe/zdoq7w.png' },
                { name: 'Call of Duty: MW3', console: 'PS5', image: 'https://files.catbox.moe/zdoq7w.png' }
            ],
            ps4: [
                { name: 'God of War', console: 'PS4', image: 'https://files.catbox.moe/zdoq7w.png' },
                { name: 'The Last of Us 2', console: 'PS4', image: 'https://files.catbox.moe/zdoq7w.png' },
                { name: 'GTA V', console: 'PS4', image: 'https://files.catbox.moe/zdoq7w.png' },
                { name: 'Red Dead Redemption 2', console: 'PS4', image: 'https://files.catbox.moe/zdoq7w.png' }
            ],
            ps3: [
                { name: 'God of War III', console: 'PS3', image: 'https://files.catbox.moe/zdoq7w.png' },
                { name: 'NFS Most Wanted', console: 'PS3', image: 'https://files.catbox.moe/zdoq7w.png' }
            ],
            pc: [
                { name: 'Cyberpunk 2077', console: 'PC', image: 'https://files.catbox.moe/zdoq7w.png' },
                { name: 'Valorant', console: 'PC', image: 'https://files.catbox.moe/zdoq7w.png' }
            ]
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function filterGames(console) {
            const grid = document.getElementById('gamesGrid');
            let gamesToShow = [];
            
            if (console === 'all') {
                gamesToShow = [...games.ps5, ...games.ps4, ...games.ps3, ...games.pc];
            } else {
                gamesToShow = games[console] || [];
            }
            
            grid.innerHTML = gamesToShow.map(game => `
                <div class="card" onclick="showToast('Demo: ${game.name} selected')">
                    <img src="${game.image}" alt="${game.name}" class="card-image">
                    <h4>${game.name}</h4>
                    <p>${game.console}</p>
                    <button class="btn" style="margin-top: 0.5rem; width: 100%;" 
                            onclick="event.stopPropagation(); showToast('Demo: Booking ${game.name}')">
                        Book Now
                    </button>
                </div>
            `).join('');
        }

        // Load all games on page load
        filterGames('all');
    </script>
</body>
</html>
