<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAZY TECH - Movies</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <img src="https://files.catbox.moe/2sbsgm.png" alt="EAZY TECH" class="logo-img">
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="games.html">Games</a></li>
            <li><a href="movies.html" class="active">Movies</a></li>
            <li><a href="admin.html">Admin</a></li>
            <li><a href="payment.html">Pay</a></li>
            <li><a href="complaint.html">Help</a></li>
        </ul>
    </nav>

    <main>
        <h1>🎬 Latest Movies</h1>
        <p style="color: var(--text-secondary); margin-bottom: 1rem;">Powered by OMDb API | Search any movie</p>
        
        <!-- Search -->
        <div style="display: flex; gap: 0.5rem; margin-bottom: 2rem;">
            <input type="text" id="movieSearch" placeholder="Search for movies... (e.g., Avengers)" value="Avengers" style="flex: 1;">
            <button class="btn-primary" onclick="searchMovies()">Search</button>
        </div>

        <!-- Movies Grid -->
        <div class="card-grid" id="moviesGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">Loading movies...</div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <img src="https://files.catbox.moe/2sbsgm.png" alt="EAZY TECH" class="footer-logo">
                <p>Your #1 gaming & cyber hub in Eldoret.</p>
            </div>
            <div class="footer-section">
                <h4>Contact</h4>
                <ul>
                    <li><i class="fas fa-phone"></i> +254 758 476 795</li>
                    <li><i class="fas fa-envelope"></i> wangamegan@gmail.com</li>
                </ul>
            </div>
        </div>
    </footer>

    <div id="toast" class="toast"></div>

    <script>
        const API_KEY = '9b5d7e52';

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function searchMovies() {
            const searchTerm = document.getElementById('movieSearch').value || 'Avengers';
            const grid = document.getElementById('moviesGrid');
            
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem;">Searching for movies...</div>';
            
            try {
                // Search for movies
                const searchResponse = await fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&s=${encodeURIComponent(searchTerm)}&type=movie`);
                const searchData = await searchResponse.json();
                
                if (searchData.Search && searchData.Search.length > 0) {
                    // Get details for first 8 movies
                    const moviePromises = searchData.Search.slice(0, 8).map(movie => 
                        fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&i=${movie.imdbID}`).then(res => res.json())
                    );
                    
                    const movies = await Promise.all(moviePromises);
                    
                    grid.innerHTML = movies.map(movie => `
                        <div class="card" onclick="showToast('Demo: ${movie.Title} selected')">
                            <img src="${movie.Poster !== 'N/A' ? movie.Poster : 'https://files.catbox.moe/prmmvz.png'}" 
                                 alt="${movie.Title}" 
                                 class="card-image"
                                 onerror="this.src='https://files.catbox.moe/prmmvz.png'">
                            <h4>${movie.Title.length > 20 ? movie.Title.substring(0, 20) + '...' : movie.Title}</h4>
                            <p>${movie.Year} • ⭐ ${movie.imdbRating || 'N/A'}</p>
                            <button class="btn" style="margin-top: 0.5rem; width: 100%;" 
                                    onclick="event.stopPropagation(); showToast('Demo: Booking ${movie.Title}')">
                                Book Ticket
                            </button>
                        </div>
                    `).join('');
                } else {
                    // Fallback to demo movies
                    showFallbackMovies();
                }
            } catch (error) {
                console.error('Error:', error);
                showFallbackMovies();
            }
        }

        function showFallbackMovies() {
            const grid = document.getElementById('moviesGrid');
            const fallbackMovies = [
                { title: 'Avengers: Secret Wars', year: '2026', rating: '8.5', image: 'https://files.catbox.moe/prmmvz.png' },
                { title: 'Avatar 3', year: '2026', rating: '8.5', image: 'https://files.catbox.moe/prmmvz.png' },
                { title: 'Godzilla x Kong 2', year: '2026', rating: '7.8', image: 'https://files.catbox.moe/prmmvz.png' },
                { title: 'Spider-Man 4', year: '2026', rating: '8.2', image: 'https://files.catbox.moe/prmmvz.png' },
                { title: 'Dune: Messiah', year: '2026', rating: '8.7', image: 'https://files.catbox.moe/prmmvz.png' },
                { title: 'Fast X: Part 2', year: '2026', rating: '7.5', image: 'https://files.catbox.moe/prmmvz.png' }
            ];
            
            grid.innerHTML = fallbackMovies.map(movie => `
                <div class="card" onclick="showToast('Demo: ${movie.title} selected')">
                    <img src="${movie.image}" alt="${movie.title}" class="card-image">
                    <h4>${movie.title}</h4>
                    <p>${movie.year} • ⭐ ${movie.rating}</p>
                    <button class="btn" style="margin-top: 0.5rem; width: 100%;" 
                            onclick="event.stopPropagation(); showToast('Demo: Booking ${movie.title}')">
                        Book Ticket
                    </button>
                </div>
            `).join('');
            
            showToast('Demo: Using fallback movies. API may be rate limited.');
        }

        // Load movies on page load
        searchMovies();
    </script>
</body>
</html>
